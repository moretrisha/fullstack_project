<!DOCTYPE html>
<html>
<head>
<title>Dark Mode</title>
<style>
body {
  background-color: white;
  color: black;
}
.dark {
  background-color: black;
  color: white;
}
</style>
</head>
<body>

<h2>Dark Mode Example</h2>
<button onclick="toggleMode()">Toggle Dark Mode</button>

<script>
function toggleMode() {
  document.body.classList.toggle("dark");
}
</script>

</body>
</html>
