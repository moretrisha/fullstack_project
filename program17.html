<!DOCTYPE html>
<html>
<head>
<title>Registration Form</title>
</head>
<body>

<h2>Student Registration</h2>

<form>
Name: <input type="text" required><br><br>
Email: <input type="email" required><br><br>
Password: <input type="password" required><br><br>

Gender:
<input type="radio" name="g"> Male
<input type="radio" name="g"> Female<br><br>

Hobbies:
<input type="checkbox"> Reading
<input type="checkbox"> Sports<br><br>

DOB: <input type="date"><br><br>

City:
<select>
<option>Mumbai</option>
<option>Pune</option>
<option>CSN</option>
<option>Buldhana</option>
<option>Nanded</option>
<option>Nagpur</option>
</select><br><br>

Upload File: <input type="file"><br><br>

<input type="submit">
</form>

</body>
</html>
